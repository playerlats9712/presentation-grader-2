<!DOCTYPE html>
<html lang="de">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Präsentations-Feedback Profi</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <style>
        body {
            background-color: #0b0f19;
            color: #e5e7eb;
            font-family: 'Inter', sans-serif;
        }
        .card {
            background-color: #111827;
            border: 1px solid #1f2937;
            border-radius: 0.75rem;
        }
        .input-dark {
            background-color: #1f2937;
            border: 1px solid #374151;
            color: white;
            padding: 0.5rem;
            border-radius: 0.375rem;
        }
        .btn-primary {
            background-color: #2563eb;
            transition: background-color 0.2s;
        }
        .btn-primary:hover {
            background-color: #1d4ed8;
        }
        @media print {
            .no-print { display: none !important; }
            body { background-color: white; color: black; }
            .card { border: none; background: white; color: black; }
            .input-dark { border: 1px solid #ccc; color: black; background: white; }
        }
    </style>
</head>
<body class="p-4 md:p-8">

    <div class="max-w-6xl mx-auto">
        <!-- Header -->
        <div class="flex flex-col md:flex-row justify-between items-start md:items-center mb-8 gap-4">
            <div>
                <h1 class="text-3xl font-bold">Präsentations-Feedback</h1>
                <p class="text-gray-400">Individueller Ergebnisbericht</p>
            </div>
            <div class="flex gap-2 no-print">
                <button onclick="exportJSON()" class="bg-gray-700 hover:bg-gray-600 px-4 py-2 rounded-lg text-sm transition">Vorlage Exportieren</button>
                <label class="bg-gray-700 hover:bg-gray-600 px-4 py-2 rounded-lg text-sm cursor-pointer transition">
                    Vorlage Importieren
                    <input type="file" id="importFile" class="hidden" accept=".json" onchange="importJSON(event)">
                </label>
                <button onclick="window.print()" class="btn-primary px-6 py-2 rounded-lg font-semibold shadow-lg">Als PDF exportieren</button>
            </div>
        </div>

        <div class="grid grid-cols-1 lg:grid-cols-3 gap-8">
            <!-- Linke Spalte: Informationen & Kriterien -->
            <div class="lg:col-span-2 space-y-6">
                
                <!-- Informationen Card -->
                <div class="card p-6">
                    <h2 class="text-xl font-semibold mb-4 border-b border-gray-700 pb-2">Informationen</h2>
                    <div class="grid grid-cols-1 md:grid-cols-2 gap-4">
                        <div class="flex flex-col">
                            <label class="text-sm text-gray-400 mb-1">Referent/in</label>
                            <input type="text" placeholder="Name" class="input-dark">
                        </div>
                        <div class="flex flex-col">
                            <label class="text-sm text-gray-400 mb-1">Thema</label>
                            <input type="text" placeholder="Titel der Präsentation" class="input-dark">
                        </div>
                    </div>
                </div>

                <!-- Bewertungskriterien Card -->
                <div class="card p-6">
                    <div class="flex justify-between items-center mb-4">
                        <h2 class="text-xl font-semibold">Bewertungskriterien</h2>
                        <div class="flex gap-2 no-print">
                            <input type="text" id="newCriterionName" placeholder="Neues Kriterium..." class="input-dark text-sm w-40">
                            <button onclick="addCriterion()" class="bg-blue-600 hover:bg-blue-500 w-8 h-8 rounded-lg flex items-center justify-center font-bold">+</button>
                        </div>
                    </div>
                    
                    <div id="criteriaList" class="space-y-4">
                        <!-- Items werden per JS eingefügt -->
                    </div>
                </div>
            </div>

            <!-- Rechte Spalte: Gesamtergebnis & Visualisierung -->
            <div class="space-y-6">
                <div class="card p-6 text-center sticky top-8">
                    <p class="text-xs uppercase tracking-widest text-gray-400 mb-2">Gesamtergebnis</p>
                    <div id="totalScore" class="text-7xl font-bold text-blue-500 mb-4">0.0</div>
                    
                    <div class="mb-4">
                        <p class="text-sm font-semibold mb-4">Visualisierung</p>
                        <div class="relative h-64 w-full flex items-center justify-center">
                            <canvas id="radarChart"></canvas>
                        </div>
                    </div>

                    <div class="text-left mt-6">
                        <p class="text-xs text-gray-500 italic">* Die Gewichtung beeinflusst das Gesamtergebnis (Standard: 1.0)</p>
                    </div>
                </div>
            </div>
        </div>
    </div>

    <script>
        let criteria = [
            { id: 1, name: 'Ausdrucksweise', score: 0, weight: 1.0 },
            { id: 2, name: 'Qualität der Präsentation', score: 0, weight: 1.0 },
            { id: 3, name: 'Korrektheit der Infos', score: 0, weight: 1.0 },
            { id: 4, name: 'Persönlicher Nutzen/Wirkung', score: 0, weight: 1.0 }
        ];

        let chart = null;

        function initChart() {
            const ctx = document.getElementById('radarChart').getContext('2d');
            chart = new Chart(ctx, {
                type: 'radar',
                data: {
                    labels: criteria.map(c => c.name),
                    datasets: [{
                        label: 'Bewertung',
                        data: criteria.map(c => c.score),
                        backgroundColor: 'rgba(37, 99, 235, 0.2)',
                        borderColor: '#2563eb',
                        pointBackgroundColor: '#2563eb',
                        borderWidth: 2
                    }]
                },
                options: {
                    scales: {
                        r: {
                            min: 0,
                            max: 5,
                            beginAtZero: true,
                            grid: { color: '#374151' },
                            angleLines: { color: '#374151' },
                            pointLabels: { color: '#9ca3af' },
                            ticks: { display: false, stepSize: 1 }
                        }
                    },
                    plugins: { legend: { display: false } },
                    responsive: true,
                    maintainAspectRatio: false
                }
            });
        }

        function renderCriteria() {
            const container = document.getElementById('criteriaList');
            container.innerHTML = '';

            criteria.forEach(c => {
                const div = document.createElement('div');
                div.className = 'flex flex-col md:flex-row md:items-center justify-between p-4 bg-gray-800 rounded-lg border border-gray-700 transition-all hover:border-gray-500 group';
                
                div.innerHTML = `
                    <div class="flex-1 mb-3 md:mb-0">
                        <div class="flex items-center gap-2">
                            <span class="font-medium">${c.name}</span>
                            <button onclick="removeCriterion(${c.id})" class="no-print opacity-0 group-hover:opacity-100 text-red-400 hover:text-red-300 text-sm transition">×</button>
                        </div>
                        <div class="flex items-center gap-2 mt-1 no-print">
                            <label class="text-[10px] text-gray-500 uppercase">Gewichtung:</label>
                            <input type="number" step="0.1" value="${c.weight}" 
                                onchange="updateWeight(${c.id}, this.value)"
                                class="bg-transparent border-b border-gray-600 text-xs w-12 text-blue-400 focus:outline-none">
                        </div>
                    </div>
                    <div class="flex gap-2">
                        ${[1, 2, 3, 4, 5].map(num => `
                            <button onclick="setScore(${c.id}, ${num})" 
                                class="w-10 h-10 rounded flex items-center justify-center transition-all ${c.score === num ? 'bg-blue-600 text-white shadow-lg' : 'bg-gray-700 text-gray-300 hover:bg-gray-600'}">
                                ${num}
                            </button>
                        `).join('')}
                    </div>
                `;
                container.appendChild(div);
            });

            updateTotal();
            if(chart) {
                chart.data.labels = criteria.map(c => c.name);
                chart.data.datasets[0].data = criteria.map(c => c.score);
                chart.update();
            }
        }

        function addCriterion() {
            const input = document.getElementById('newCriterionName');
            const name = input.value.trim();
            if (name) {
                criteria.push({
                    id: Date.now(),
                    name: name,
                    score: 0,
                    weight: 1.0
                });
                input.value = '';
                renderCriteria();
            }
        }

        function removeCriterion(id) {
            criteria = criteria.filter(c => c.id !== id);
            renderCriteria();
        }

        function setScore(id, score) {
            const index = criteria.findIndex(c => c.id === id);
            if (index !== -1) {
                criteria[index].score = criteria[index].score === score ? 0 : score;
                renderCriteria();
            }
        }

        function updateWeight(id, weight) {
            const index = criteria.findIndex(c => c.id === id);
            if (index !== -1) {
                criteria[index].weight = parseFloat(weight) || 1.0;
                updateTotal();
            }
        }

        function updateTotal() {
            let totalWeight = 0;
            let weightedSum = 0;

            criteria.forEach(c => {
                weightedSum += (c.score * c.weight);
                totalWeight += c.weight;
            });

            const result = totalWeight > 0 ? (weightedSum / totalWeight).toFixed(1) : "0.0";
            document.getElementById('totalScore').innerText = result;
        }

        function exportJSON() {
            const dataStr = "data:text/json;charset=utf-8," + encodeURIComponent(JSON.stringify(criteria));
            const downloadAnchorNode = document.createElement('a');
            downloadAnchorNode.setAttribute("href", dataStr);
            downloadAnchorNode.setAttribute("download", "feedback_vorlage.json");
            document.body.appendChild(downloadAnchorNode);
            downloadAnchorNode.click();
            downloadAnchorNode.remove();
        }

        function importJSON(event) {
            const file = event.target.files[0];
            if (!file) return;
            const reader = new FileReader();
            reader.onload = function(e) {
                try {
                    const imported = JSON.parse(e.target.result);
                    if (Array.isArray(imported)) {
                        criteria = imported;
                        renderCriteria();
                    }
                } catch (err) {
                    alert("Ungültige JSON-Datei");
                }
            };
            reader.readAsText(file);
        }

        window.onload = () => {
            initChart();
            renderCriteria();
        };
    </script>
</body>
</html>
